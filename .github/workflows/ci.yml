name: CI

# PR이 main/develop 대상으로 열리거나, main/develop에 푸시될 때 자동 체크한다.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# 모든 job에 대한 기본 GITHUB_TOKEN 권한을 최소(읽기 전용)로 제한한다.
# 우리 CI는 lint·test만 수행하므로 contents: read 로 충분하다.
permissions:
  contents: read

jobs:
  commit-metadata:
    name: Commit metadata policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject AI attribution and public session links
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          commit_messages="$(git log --format=%B "${BASE_SHA}..${HEAD_SHA}")"
          if printf '%s\n' "$commit_messages" \
            | grep -Eiq '^[[:space:]]*(Co-Authored-By:|Claude-Session:|AI-Model:)|https?://claude\.ai/(code/session_|share/)'; then
            echo '커밋 메시지에 금지된 AI attribution 또는 세션 링크가 있습니다.' >&2
            exit 1
          fi

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check app scripts tests ui

  test:
    name: Test (pytest + graph smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest
      # 외부 API 키·네트워크 없이 그래프가 완주하는지 스모크 테스트
      - run: python scripts/run_graph.py --auto-approve --offline
