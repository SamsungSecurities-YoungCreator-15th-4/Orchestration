# 아래 숫자는 법정 한도가 아니라 공식 적합성·분산 원칙을 운영 가능한
# 사전 red flag로 바꾼 팀 내부 기준이다. 실제 상품 위험등급 확정 전에는
# severity=review로만 사용하고 PB의 근거 있는 예외 승인을 허용한다.
thresholds:
  max_liquidity_need_ratio: 0.30
  min_years_for_risky_assets: 1.0
  balanced_max_risky_ratio: 0.60
  max_single_risky_asset_ratio: 0.40

